<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Yuya Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="profile">
                <div class="avatar"></div>
                <h1>Your Name</h1>
                <p class="tagline">University Student & Researcher</p>
            </div>
            <nav>
                <a href="#home" class="active">Home</a>
                <a href="#projects">Projects</a>
                <a href="#research">Research</a>
                <a href="#hobbies">Hobbies</a>
            </nav>
            <div class="footer-note">Available for 2024 Internships</div>
        </aside>

        <main class="content">
            <section id="home" class="bento-hero">
                <div class="bento-box large">
                    <h2>Hello! I'm a student at [University] focusing on [Major].</h2>
                </div>
            </section>

            <section id="projects">
                <h3 class="section-label">Selected Projects</h3>
                <div class="bento-grid">
                    <div class="bento-box project-card">Project One</div>
                    <div class="bento-box project-card">Project Two</div>
                    <div class="bento-box project-card wide">Project Three (Featured)</div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
